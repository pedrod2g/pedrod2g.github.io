name: Daily Blog Post

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish next queued post
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          QUEUE_DIR="_post_queue"
          POSTS_DIR="_posts"
          TODAY="$(date -u +%Y-%m-%d)"

          if ls "$POSTS_DIR/${TODAY}"-*.md >/dev/null 2>&1; then
            echo "A post for $TODAY already exists — skipping."
            exit 0
          fi

          next_file="$(ls "$QUEUE_DIR"/[0-9]*.md 2>/dev/null | sort | head -n 1 || true)"

          if [ -z "$next_file" ]; then
            echo "Queue is empty — nothing to publish today."
            existing_issue="$(gh issue list --search 'Blog post queue is empty in:title' --state open --json number --jq '.[0].number' || true)"
            if [ -z "$existing_issue" ]; then
              gh issue create \
                --title "Blog post queue is empty" \
                --body "The daily blog post workflow ran and found no files left in \`_post_queue/\`. Add more queued posts (see _post_queue/README.md format) to resume daily publishing."
            fi
            exit 0
          fi

          filename="$(basename "$next_file")"
          slug="$(echo "$filename" | sed -E 's/^[0-9]+-//; s/\.md$//')"
          new_path="${POSTS_DIR}/${TODAY}-${slug}.md"

          sed -E "s/^date: 0000-00-00$/date: ${TODAY}/" "$next_file" > "$new_path"
          rm "$next_file"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$POSTS_DIR" "$QUEUE_DIR"
          git commit -m "Publish daily post: ${slug}"
          git push
